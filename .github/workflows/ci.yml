name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - run: yarn install
      - name: ESLint
        run: |
          changed_files=$(git diff --name-only --diff-filter=ACMRUXB ${{ github.event.pull_request.base.sha }})

          if echo "$changed_files" | grep -q "^eslint.config.mjs$"; then
            yarn lint
          else
            echo "$changed_files" | grep -E "(.js$|.ts$)" | xargs -r yarn lint
          fi
      - name: Prettier
        run: |
          changed_files=$(git diff --name-only --diff-filter=ACMRUXB ${{ github.event.pull_request.base.sha }})

          if echo "$changed_files" | grep -q -E "^\.prettierrc$|^\.prettierignore$"; then
            yarn prettier -c .
          else
            echo "$changed_files" | xargs -r yarn prettier -c --ignore-unknown
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - run: yarn install
      - name: Typecheck
        run: yarn tsc --noEmit

  pre-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - run: yarn install
      - name: Build
        run: yarn pack --out package.tgz
      - name: Check Dist
        run: node --test .scripts/check-dist.mjs
      - name: Check Package Types
        run: yarn attw package.tgz

  check-peer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - run: yarn install
      - name: Check Peer Dependency
        run: ./.scripts/check-peer.sh || (echo "Peer Dependency 오류가 발생했습니다."; exit 1)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1
      - run: corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
      - run: yarn install
      - name: vitest
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn vitest --changed ${{ github.event.pull_request.base.sha }} --reporter=github-actions
          else
            yarn vitest --reporter=github-actions
          fi
